kind = "web"
previewPath = "/"
title = "Setup Rater"
version = "1.0.0"
id = "artifacts/setup-rater"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "PORT=3000 BASE_PATH=/ pnpm --filter @workspace/setup-rater run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/setup-rater", "run", "build" ]
publicDir = "artifacts/setup-rater/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
