openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for Setup Rater
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: analysis
    description: AI setup analysis operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /analyze:
    post:
      operationId: analyzeSetup
      tags: [analysis]
      summary: Analyze a workstation setup photo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeInput"
      responses:
        "200":
          description: Analysis complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeInput:
      type: object
      required:
        - imageBase64
        - mimeType
      properties:
        imageBase64:
          type: string
        mimeType:
          type: string
    CategoryScore:
      type: object
      required:
        - score
        - comment
      properties:
        score:
          type: number
        comment:
          type: string
    AnalysisResultCategories:
      type: object
      required:
        - aesthetics
        - lighting
        - cleanliness
        - ergonomics
        - cable_management
        - atmosphere
        - minimalism
      properties:
        aesthetics:
          $ref: "#/components/schemas/CategoryScore"
        lighting:
          $ref: "#/components/schemas/CategoryScore"
        cleanliness:
          $ref: "#/components/schemas/CategoryScore"
        ergonomics:
          $ref: "#/components/schemas/CategoryScore"
        cable_management:
          $ref: "#/components/schemas/CategoryScore"
        atmosphere:
          $ref: "#/components/schemas/CategoryScore"
        minimalism:
          $ref: "#/components/schemas/CategoryScore"
    AnalysisResult:
      type: object
      required:
        - overall_score
        - categories
        - review
        - tips
      properties:
        overall_score:
          type: number
        categories:
          $ref: "#/components/schemas/AnalysisResultCategories"
        review:
          type: string
        tips:
          type: array
          items:
            type: string
    ApiError:
      type: object
      required:
        - error
      properties:
        error:
          type: string
