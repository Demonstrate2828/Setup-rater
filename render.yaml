services:
  - type: web
    name: setup-rater
    runtime: python
    plan: free
    buildCommand: >-
      pip install -r requirements.txt &&
      npx --yes pnpm@latest install &&
      BASE_PATH=/ PORT=3000 npx --yes pnpm@latest --filter @workspace/setup-rater run build
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROK_API_KEY
        sync: false
